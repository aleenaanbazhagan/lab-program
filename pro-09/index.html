<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Image Slider</title> 
<style> 
.slider { 
text-align: center; 
position: relative; 
width: 60%; 
margin: auto; 
} 
.slider img { 
width: 100%; 
height: auto; 
} 
.slider button { 
position: absolute; 
top: 50%; 
transform: translateY(-50%); 
padding: 10px; 
background-color: rgba(0, 0, 0, 0.5); 
color: white; 
border: none; 
cursor: pointer; 
} 
#prevBtn { 
left: 10px; 
} 
#nextBtn { 
right: 10px; 
} 
</style> 
</head> 
<body> 
<div class="slider"> 
<img src="image1.jpg" class="slider-image" alt="Image 1"> 
<button id="prevBtn">Previous</button> 
<button id="nextBtn">Next</button> 
</div> 
<script> 
let images = ["https://cdn.pixabay.com/photo/2020/12/10/08/44/mountains-5819652_1280.jpg", "https://cdn.pixabay.com/photo/2024/02/12/16/05/siguniang-mountain-8568913_1280.jpg", "https://cdn.pixabay.com/photo/2016/12/04/21/22/snowman-1882635_960_720.jpg"]; 
let currentIndex = 0; 
const imgElement = document.querySelector(".slider-image"); 
const nextBtn = document.getElementById("nextBtn"); 
const prevBtn = document.getElementById("prevBtn"); 
// Manual image navigation 
nextBtn.addEventListener("click", () => { 
currentIndex = (currentIndex + 1) % images.length; 
imgElement.src = images[currentIndex]; 
}); 
prevBtn.addEventListener("click", () => { 
currentIndex = (currentIndex - 1 + images.length) % images.length; 
imgElement.src = images[currentIndex]; 
}); 
// Automatic image change every 3 seconds 
setInterval(() => { 
currentIndex = (currentIndex + 1) % images.length; 
imgElement.src = images[currentIndex]; 
}, 3000);
</script> 
</body> 
</html>
