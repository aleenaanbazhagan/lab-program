
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style> 
        body{
    font-family: Arial,sans-serif;
    text-align: center;
    margin-top: 50px;
}
#display{
    font-size: 48px;
    margin-bottom: 20px;
}
button{
    font-size: 18px;
    padding: 10px 20px;
    margin: 5px;
    border-radius: 5px;
}
.start{
    background-color: #4caf50;
    color: white;
    border:none;
}
.stop{
    background-color: red;
    color: white;
    border: none;
}
.reset{
    background-color: lightblue;
    color: white;
    border: none;
}
    </style>
</head>
<body>
    <h2>stop watch</h2>
    <p id="display"></p>
    <button onclick="start()" class="start">start</button>
    <button onclick="stop()" class="stop">stop</button>
    <button onclick="reset()" class="reset"> reset</button>
    <script>
        
 let seconds = 0;
let intervalId = null;
function updateDisplay() {
  const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
  const secs = String(seconds % 60).padStart(2, '0');
  document.getElementById("display").innerText = `${mins}:${secs}`;
}
  function start(){
    if(intervalId){}
    intervalId = setInterval(()=>{
        seconds ++;
        updateDisplay();
    },1000);
  }
function stop(){
    clearInterval(intervalId);
    intervalId = null;
}
function reset(){
    stop();
    seconds = 0;
    updateDisplay();
}

    </script>
</body>
</html>
